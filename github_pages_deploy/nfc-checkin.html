<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NFC区域签到</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #93c5fd);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body.view-mode {
    background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    justify-content: flex-start;
    padding: 12px;
  }

  /* ===== 签到卡片 ===== */
  .card {
    background: white;
    border-radius: 24px;
    padding: 36px 28px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .emoji { font-size: 64px; margin-bottom: 12px; }
  .title { font-size: 28px; font-weight: bold; color: #1e40af; margin-bottom: 4px; }
  .subtitle { font-size: 18px; color: #6b7280; margin-bottom: 20px; }
  .name-display {
    background: #eff6ff;
    border: 3px solid #3b82f6;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .name-display .label { font-size: 14px; color: #6b7280; }
  .name-display .value { font-size: 32px; font-weight: bold; color: #1d4ed8; }
  .btn {
    display: block;
    width: 100%;
    background: #22c55e;
    color: white;
    font-size: 28px;
    font-weight: bold;
    padding: 18px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(34,197,94,0.4);
    margin-top: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: #d1d5db; box-shadow: none; }
  .loading { display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #dc2626; font-size: 14px; margin-top: 10px; }
  body.success { background: linear-gradient(135deg, #86efac, #22c55e); }
  body.error { background: linear-gradient(135deg, #fca5a5, #ef4444); }
  body.ready { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); }
  .success-card {
    background: white;
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .success-emoji { font-size: 80px; margin-bottom: 16px; }
  .success-title { font-size: 28px; font-weight: bold; color: #166534; }
  .success-detail { font-size: 18px; color: #15803d; margin-top: 8px; }
  .success-time { font-size: 14px; color: #166534; margin-top: 4px; }
  .success-go { font-size: 22px; color: #166534; margin-top: 16px; }
  .footer { margin-top: 20px; font-size: 12px; color: rgba(0,0,0,0.3); text-align: center; }

  /* ===== 查看记录入口按钮 ===== */
  .view-btn {
    display: inline-block;
    background: rgba(0,0,0,0.08);
    color: #374151;
    font-size: 14px;
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .view-btn:active { background: rgba(0,0,0,0.15); }

  /* ===== 记录查看页面 ===== */
  .record-header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .record-header h2 {
    font-size: 20px;
    color: #1e40af;
  }
  .back-btn {
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 15px;
    cursor: pointer;
    color: #374151;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { background: #f3f4f6; }

  /* 筛选栏 */
  .filter-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar select, .filter-bar input {
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    background: white;
    color: #374151;
  }
  .filter-bar select { flex: 1; min-width: 100px; }
  .filter-bar input { flex: 2; min-width: 120px; }
  .filter-bar .date-input { flex: 1.5; min-width: 130px; }

  /* 统计摘要 */
  .summary {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .summary-item .num { font-size: 24px; font-weight: bold; color: #1e40af; }
  .summary-item .desc { font-size: 12px; color: #6b7280; }

  /* 记录表格 */
  .record-list {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-height: 60vh;
    overflow-y: auto;
  }
  .record-list table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .record-list thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .record-list th {
    background: #1e40af;
    color: white;
    padding: 10px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
  }
  .record-list td {
    padding: 10px 8px;
    border-bottom: 1px solid #f3f4f6;
    color: #374151;
  }
  .record-list tr:nth-child(even) { background: #f9fafb; }
  .record-list tr:last-child td { border-bottom: none; }
  .area-tag {
    display: inline-block;
    background: #dbeafe;
    color: #1e40af;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
  }

  /* 底部操作 */
  .record-actions {
    width: 100%;
    max-width: 500px;
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { opacity: 0.8; }
  .export-btn { background: #22c55e; color: white; }
  .clear-btn { background: #ef4444; color: white; }

  .empty-msg {
    width: 100%;
    max-width: 500px;
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
    font-size: 16px;
  }
  .empty-msg .big-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- ===== 签到页面 ===== -->
<div id="checkinView">
  <div class="card" id="checkinCard">
    <div id="areaEmoji" style="font-size:64px; margin-bottom:12px;">👋</div>
    <div class="title" id="areaTitle">准备运动</div>
    <div class="subtitle" id="areaSubtitle">碰一下你的手环签到吧！</div>
    <div class="name-display">
      <div class="label">你是</div>
      <div class="value" id="nameValue">张小明</div>
    </div>
    <button class="btn" id="confirmBtn" onclick="confirmCheckin()">
      ✅ 到了！点这里签到
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <button class="view-btn" onclick="showRecords()">📋 查看打卡记录</button>
  <button class="view-btn" onclick="showAreaSelector()" style="margin-left:6px;font-size:13px;">📅 切换区域</button>

  <div class="footer" id="footerText">幼儿园户外运动打卡系统</div>
</div>

<!-- ===== 记录查看页面 ===== -->
<div id="recordView" style="display:none; width:100%; max-width:500px;">
  <div class="record-header">
    <h2>📋 打卡记录</h2>
    <button class="back-btn" onclick="hideRecords()">← 返回签到</button>
  </div>

  <div class="filter-bar">
    <input type="text" id="filterName" placeholder="搜索姓名…" oninput="renderRecords()">
    <select id="filterArea" onchange="renderRecords()">
      <option value="">全部区域</option>
    </select>
    <input type="date" id="filterDate" class="date-input" onchange="renderRecords()">
  </div>

  <div class="summary" id="summaryBar"></div>

  <div class="record-list" id="recordList"></div>

  <div class="record-actions">
    <button class="action-btn export-btn" onclick="exportCSV()">📥 导出CSV</button>
    <button class="action-btn clear-btn" onclick="clearRecords()">🗑️ 清空记录</button>
  </div>

  <div class="footer" style="margin-top:12px;">按E键快速导出 · 数据存在本地设备</div>
</div>

<script>
// ===== 核心配置：可以从 localStorage 或 URL 参数设置区域 =====
// 优先级：localStorage.area_setting > URL?area= > localStorage.last_area > 默认（第一个区域）
const ALL_AREAS = ['灌篮小乐宝', 'IT小乐宝', '智驾小乐宝', '智酷小乐宝', '绳趣小乐宝', '芯动小乐宝'];
const AREA_EMOJI = {
  '灌篮小乐宝': '🏀', 'IT小乐宝': '💻', '智驾小乐宝': '🚗',
  '智酷小乐宝': '🎯', '绳趣小乐宝': '🪢', '芯动小乐宝': '🧗'
};
const AREA_DESC = {
  '灌篮小乐宝': '投个漂亮的三分球吧！🏀',
  'IT小乐宝': '快来做个小程序员吧！💻',
  '智驾小乐宝': '小司机出发啦！🚗',
  '智酷小乐宝': '创造力超酷！🎯',
  '绳趣小乐宝': '跳啊跳啊真开心！🪢',
  '芯动小乐宝': '吊环、攀爬、雨林杆，勇敢向上冲！🧗'
};

function getArea() {
  // 从 localStorage 读取固定区域设置（平板的老师设置）
  const manualArea = localStorage.getItem('nfc_current_area');
  if (manualArea && ALL_AREAS.includes(manualArea)) return manualArea;

  // 从 URL 参数
  const params = new URLSearchParams(window.location.search);
  const urlArea = params.get('area');
  if (urlArea && ALL_AREAS.includes(urlArea)) return urlArea;

  // 从 localStorage 读取上次签到的区域（自动记忆）
  const lastArea = localStorage.getItem('nfc_last_area');
  if (lastArea && ALL_AREAS.includes(lastArea)) return lastArea;

  // 默认第一个区域
  return ALL_AREAS[0];
}

// 从URL中读取姓名 — 优先级：hash > search > parent search
function getName() {
  const hash = window.location.hash;
  if (hash && hash.length > 1) {
    const h = hash.substring(1);
    if (h.indexOf('name=') === 0 || h.indexOf('n=') === 0) {
      return decodeURIComponent(h.split('=')[1]);
    }
    return decodeURIComponent(h);
  }
  const params = new URLSearchParams(window.location.search);
  const fromSearch = params.get('name') || params.get('n');
  if (fromSearch) return decodeURIComponent(fromSearch);
  try {
    const parentParams = new URLSearchParams(window.parent.location.search);
    const fromParent = parentParams.get('name') || parentParams.get('n');
    if (fromParent) return decodeURIComponent(fromParent);
    const parentHash = window.parent.location.hash;
    if (parentHash && parentHash.length > 1) {
      const ph = parentHash.substring(1);
      if (ph.indexOf('name=') === 0 || ph.indexOf('n=') === 0) {
        return decodeURIComponent(ph.split('=')[1]);
      }
      return decodeURIComponent(ph);
    }
  } catch(e) {}
  return '';
}

function formatTime(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}

function getRecords() {
  return JSON.parse(localStorage.getItem('nfc_checkin') || '[]');
}

function saveRecords(records) {
  localStorage.setItem('nfc_checkin', JSON.stringify(records));
}

// ===== 签到逻辑 =====
const name = getName();
const currentArea = getArea(); // 动态获取区域
localStorage.setItem('nfc_last_area', currentArea); // 记住这次使用的区域
const areaTitle = document.getElementById('areaTitle');
const nameValue = document.getElementById('nameValue');
const confirmBtn = document.getElementById('confirmBtn');
const errorMsg = document.getElementById('errorMsg');
const footerText = document.getElementById('footerText');
const checkinCard = document.getElementById('checkinCard');

areaTitle.textContent = currentArea;
  document.getElementById('areaEmoji').textContent = AREA_EMOJI[currentArea];
  document.getElementById('areaSubtitle').textContent = `在${currentArea}区域运动吧！`;

  if (!name) {
    nameValue.textContent = '（碰手环显示姓名）';
    errorMsg.textContent = '👆 请用手环碰一下平板';
    confirmBtn.style.display = 'none';
    document.body.className = 'ready';
    footerText.textContent = '等待手环… 按A键可切换区域';
  } else {
    nameValue.textContent = name;
    document.getElementById('areaSubtitle').textContent = `${name}小朋友，是否签到这个区域？`;
    confirmBtn.style.display = 'block';
    errorMsg.textContent = '';
    document.body.className = 'ready';
    footerText.textContent = `姓名已识别 · ${currentArea}`;
  }

function confirmCheckin() {
  confirmBtn.disabled = true;
  confirmBtn.innerHTML = '<span class="loading"></span>';

  const record = { name: name, area: currentArea, time: formatTime(new Date()) };
  const records = getRecords();
  records.push(record);
  saveRecords(records);

  document.body.className = 'success';
  checkinCard.className = 'success-card';
  checkinCard.innerHTML =
    '<div class="success-emoji">🎉</div>' +
    '<div class="success-title">签到成功！</div>' +
    '<div class="success-detail">' + name + ' · ' + currentArea + '</div>' +
    '<div class="success-time">' + formatTime(new Date()) + '</div>' +
    '<div class="success-go">' + (AREA_DESC[currentArea] || '运动快乐！') + '</div>' +
    '<div style="margin-top:20px;font-size:13px;color:#166534;opacity:0.7;">（数据已记录到本地设备）</div>';
  footerText.textContent = '签到成功 ✅';

  setTimeout(function() { location.reload(); }, 5000);
}

// ===== 查看记录 =====
function showRecords() {
  document.getElementById('checkinView').style.display = 'none';
  document.getElementById('recordView').style.display = 'block';
  document.body.classList.add('view-mode');
  document.body.classList.remove('success', 'error');
  populateFilterArea();
  renderRecords();
}

function hideRecords() {
  document.getElementById('checkinView').style.display = '';
  document.getElementById('recordView').style.display = 'none';
  document.body.classList.remove('view-mode');
}

function populateFilterArea() {
  const records = getRecords();
  const areas = [...new Set(records.map(r => r.area))].sort();
  const sel = document.getElementById('filterArea');
  sel.innerHTML = '<option value="">全部区域</option>';
  areas.forEach(a => {
    sel.innerHTML += '<option value="' + a + '">' + a + '</option>';
  });
}

function renderRecords() {
  const allRecords = getRecords();
  const filterName = document.getElementById('filterName').value.trim();
  const filterArea = document.getElementById('filterArea').value;
  const filterDate = document.getElementById('filterDate').value;

  let filtered = allRecords.filter(r => {
    if (filterName && r.name.indexOf(filterName) === -1) return false;
    if (filterArea && r.area !== filterArea) return false;
    if (filterDate && r.time.substring(0, 10) !== filterDate) return false;
    return true;
  });

  // 按时间倒序
  filtered.sort((a, b) => b.time.localeCompare(a.time));

  // 统计
  const today = new Date().toISOString().slice(0, 10);
  const todayRecords = allRecords.filter(r => r.time.startsWith(today));
  const todayKids = new Set(todayRecords.map(r => r.name)).size;
  const todayAreas = new Set(todayRecords.map(r => r.area)).size;
  const totalToday = todayRecords.length;

  document.getElementById('summaryBar').innerHTML =
    '<div class="summary-item"><div class="num">' + totalToday + '</div><div class="desc">今日打卡</div></div>' +
    '<div class="summary-item"><div class="num">' + todayKids + '</div><div class="desc">打卡人数</div></div>' +
    '<div class="summary-item"><div class="num">' + todayAreas + '</div><div class="desc">涉及区域</div></div>' +
    '<div class="summary-item"><div class="num">' + allRecords.length + '</div><div class="desc">总计记录</div></div>';

  const listEl = document.getElementById('recordList');
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-msg"><div class="big-icon">📭</div>暂无打卡记录<br><span style="font-size:13px;">小朋友碰手环签到后这里就会显示</span></div>';
    return;
  }

  let html = '<table><thead><tr><th>序号</th><th>姓名</th><th>区域</th><th>时间</th></tr></thead><tbody>';
  filtered.forEach((r, i) => {
    html += '<tr>' +
      '<td>' + (i + 1) + '</td>' +
      '<td><strong>' + r.name + '</strong></td>' +
      '<td><span class="area-tag">' + r.area + '</span></td>' +
      '<td>' + r.time + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  listEl.innerHTML = html;
}

// ===== 导出CSV =====
function exportCSV() {
  const records = getRecords();
  if (records.length === 0) { alert('暂无记录可导出'); return; }
  let csv = '\uFEFF姓名,区域,打卡时间\n';
  records.forEach(r => { csv += r.name + ',' + r.area + ',' + r.time + '\n'; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'NFC签到记录_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 清空记录 =====
function clearRecords() {
  if (confirm('确定要清空所有打卡记录吗？\n\n⚠️ 这个操作不可恢复！建议先导出备份。')) {
    if (confirm('再次确认：真的要清空吗？')) {
      localStorage.removeItem('nfc_checkin');
      renderRecords();
    }
  }
}

// ===== 区域选择器（供老师设置平板区域） =====
function showAreaSelector() {
  let html = '<div class="area-selector-overlay" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000;">';
  html += '<div style="background:white; border-radius:20px; padding:24px; max-width:340px;">';
  html += '<h3 style="margin-bottom:16px; color:#1e40af;">📅 设置当前区域</h3>';
  html += '<p style="color:#6b7280; margin-bottom:20px; font-size:14px;">请选择这个平板所在的运动区域</p>';
  
  ALL_AREAS.forEach(area => {
    html += `<button onclick="setCurrentArea('${area}')" 
      style="display:block; width:100%; text-align:left; padding:16px; margin-bottom:8px; border-radius:14px; border:1px solid #d1d5db; background:${currentArea === area ? '#eff6ff' : 'white'}; font-size:16px; cursor:pointer;">
      ${AREA_EMOJI[area]} ${area}
      ${currentArea === area ? '  ✅' : ''}
    </button>`;
  });
  
  html += '<div style="text-align:center; margin-top:20px;">';
  html += '<button onclick="hideAreaSelector()" style="background:#f3f4f6; border:none; padding:10px 20px; border-radius:10px; font-size:14px; cursor:pointer; color:#6b7280;">取消</button>';
  html += '</div></div></div>';
  
  const overlay = document.createElement('div');
  overlay.innerHTML = html;
  overlay.id = 'areaSelector';
  document.body.appendChild(overlay);
}

function hideAreaSelector() {
  const el = document.getElementById('areaSelector');
  if (el) el.remove();
}

function setCurrentArea(area) {
  localStorage.setItem('nfc_current_area', area);
  location.reload(); // 刷新页面立即生效
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'e' || e.key === 'E') {
    exportCSV();
  }
  if (e.key === 'a' || e.key === 'A') { // A键快速打开区域选择
    showAreaSelector();
  }
});
</script>

</body>
</html>
