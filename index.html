<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=nfc-checkin.html">
    <title>🏫 幼儿园户外运动NFC签到系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            animation: progress 2s ease-in-out forwards;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary {
            background: #4CAF50;
            border-color: #45a049;
        }
        
        .btn-primary:hover {
            background: #45a049;
        }
        
        .areas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .area-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            color: white;
        }
        
        .area-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .emoji {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .areas {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏫</div>
        <h1>幼儿园户外运动NFC签到系统</h1>
        <div class="subtitle">
            欢迎使用户外运动区域签到系统！<br>
            系统正在自动跳转...
        </div>
        
        <div class="loading">
            <div class="spinner"></div>
            <div class="progress">
                <div class="progress-bar"></div>
            </div>
            <p>正在加载签到系统...</p>
        </div>
        
        <div class="links">
            <a href="nfc-checkin.html" class="btn btn-primary">
                🚀 立即进入签到页面
            </a>
            
            <div class="areas">
                <a href="nfc-checkin.html?area=灌篮小乐宝" class="area-btn">
                    <div class="emoji">🏀</div>
                    <div>灌篮小乐宝</div>
                </a>
                <a href="nfc-checkin.html?area=IT小乐宝" class="area-btn">
                    <div class="emoji">💻</div>
                    <div>IT小乐宝</div>
                </a>
                <a href="nfc-checkin.html?area=智驾小乐宝" class="area-btn">
                    <div class="emoji">🚗</div>
                    <div>智驾小乐宝</div>
                </a>
                <a href="nfc-checkin.html?area=智酷小乐宝" class="area-btn">
                    <div class="emoji">🎯</div>
                    <div>智酷小乐宝</div>
                </a>
                <a href="nfc-checkin.html?area=绳趣小乐宝" class="area-btn">
                    <div class="emoji">🪢</div>
                    <div>绳趣小乐宝</div>
                </a>
                <a href="nfc-checkin.html?area=芯动小乐宝" class="area-btn">
                    <div class="emoji">🧗</div>
                    <div>芯动小乐宝</div>
                </a>
            </div>
            
            <a href="final_instruction.md" class="btn">📖 查看使用说明</a>
        </div>
        
        <div class="footer">
            <p>© 2026 幼儿园技术部 | GitHub Pages部署</p>
            <p>系统版本：v2.0 | 最后更新：2026年4月13日</p>
            <p>技术支持：如有问题请联系幼儿园技术负责人</p>
        </div>
    </div>
    
    <script>
        // 倒计时自动跳转
        let countdown = 5;
        const countdownElement = document.querySelector('.loading p');
        
        const countdownInterval = setInterval(() => {
            countdown--;
            if (countdownElement) {
                countdownElement.textContent = `正在跳转... ${countdown}秒`;
            }
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = 'nfc-checkin.html';
            }
        }, 1000);
        
        // 如果用户手动点击了区域按钮，取消自动跳转
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                clearInterval(countdownInterval);
            });
        });
    </script>
</body>
</html>
